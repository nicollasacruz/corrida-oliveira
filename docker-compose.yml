version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corrida-oliveira
    restart: unless-stopped
    volumes:
      - ./database/database.sqlite:/var/www/database/database.sqlite
      - ./storage:/var/www/storage
      - ./.env:/var/www/.env
    environment:
      # Configurações da aplicação
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://oliveira.run.place
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      # Configurações para nginx-proxy
      - VIRTUAL_HOST=oliveira.run.place
      - LETSENCRYPT_HOST=oliveira.run.place
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
      - VIRTUAL_PORT=80
    networks:
      - reverse-proxy
      - internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  reverse-proxy:
    external: true
  internal:
    driver: bridge
