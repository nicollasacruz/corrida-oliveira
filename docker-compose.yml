services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corrida-oliveira
    restart: unless-stopped
    volumes:
      - sqlite-data:/var/www/database
      - ./storage:/var/www/storage
      - ./.env:/var/www/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://oliveira.run.place
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      # Trust proxies para funcionar com HTTPS via nginx-proxy
      - TRUSTED_PROXIES=**
      # Configurações para nginx-proxy
      - VIRTUAL_HOST=oliveira.run.place
      - LETSENCRYPT_HOST=oliveira.run.place
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
      - VIRTUAL_PORT=80
    networks:
      - reverse-proxy
      - internal
    extra_hosts:
      - "mail.sarahcruz.pt:172.19.0.1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sqlite-data:
    driver: local

networks:
  reverse-proxy:
    external: true
  internal:
    driver: bridge
